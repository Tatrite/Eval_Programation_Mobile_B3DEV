services:
  main_proxy:
    build: .
    image: eval_programation_mobile_b3dev:latest
    ports:
      - "8080:8080"
    environment:
      - ROLE=CHEF
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tor-network

networks:
  tor-network:
    name: tor-network
    driver: bridge